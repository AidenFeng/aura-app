<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>AURA — Interactive Demo</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",sans-serif;
    background:radial-gradient(1200px 760px at 50% -8%, #16223f, #070a14 62%);
    color:#eaf0ff;display:flex;flex-direction:column;align-items:center;justify-content:center;
    min-height:100%;padding:26px 16px;gap:16px;-webkit-font-smoothing:antialiased}
  .brand{font-size:13px;letter-spacing:.34em;font-weight:600;color:#8aa0c9;text-transform:uppercase}
  .device{
    position:relative;width:392px;max-width:94vw;height:846px;max-height:86vh;
    background:#05080f;border-radius:48px;padding:13px;
    box-shadow:0 44px 90px rgba(0,0,0,.6), 0 0 0 2px #1c2647, inset 0 0 0 1px rgba(255,255,255,.04)}
  .screen{position:relative;width:100%;height:100%;border-radius:37px;overflow:hidden;background:#000}
  .screen iframe{width:100%;height:100%;border:0;display:block}
  /* slim status pill — sits in the top margin, never overlaps app content */
  .pill{position:absolute;top:9px;left:50%;transform:translateX(-50%);
    width:96px;height:6px;background:rgba(0,0,0,.28);border-radius:999px;z-index:5;pointer-events:none}
  .hint{font-size:12px;color:#56618a}
  .hint a{color:#4fd1c5;text-decoration:none}
  .hint a:hover{text-decoration:underline}
  @media (max-width:560px){
    body{padding:0;gap:0;background:#000;display:block}
    .brand,.hint{display:none}
    .device{width:100vw;max-width:none;height:100dvh;max-height:none;border-radius:0;padding:0;box-shadow:none}
    .screen{border-radius:0}
    .pill{display:none}
  }
</style>
</head>
<body>
  <div class="brand">AURA · Interactive Demo</div>
  <div class="device">
    <div class="screen">
      <div class="pill"></div>
      <iframe src="./app/" title="AURA app demo" allow="clipboard-write; fullscreen"></iframe>
    </div>
  </div>
  <div class="hint">Mock device · tap around freely · <a href="./app/" target="_blank" rel="noopener">open fullscreen &#8599;</a></div>
</body>
</html>
